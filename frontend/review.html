<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review — PapHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/review.css" />
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-logo">PapHub</a>
    <a href="../index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
  </nav>

  <div class="card">
    <!-- Form state -->
    <div id="form-state">
      <h1 class="card-title">Leave a Review</h1>
      <p class="card-subtitle">Enter your order ID and email to verify your purchase, then share your experience.</p>

      <form id="review-form" novalidate>

        <div class="form-group">
          <label for="orderID">Order ID</label>
          <input type="text" id="orderID" placeholder="e.g. PH-A1B2C3D4" autocomplete="off" />
          <span class="field-error" id="err-orderID"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="The email you ordered with" autocomplete="email" />
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="name">Display Name</label>
          <input type="text" id="name" placeholder="How you'd like to appear" maxlength="80" />
          <span class="field-error" id="err-name"></span>
        </div>

        <div class="form-group">
          <label>Rating</label>
          <div class="star-row" id="star-row" role="group" aria-label="Star rating">
            <i class="fa-regular fa-star" data-val="1"></i>
            <i class="fa-regular fa-star" data-val="2"></i>
            <i class="fa-regular fa-star" data-val="3"></i>
            <i class="fa-regular fa-star" data-val="4"></i>
            <i class="fa-regular fa-star" data-val="5"></i>
          </div>
          <span class="rating-error" id="err-rating">Please select a rating.</span>
        </div>

        <div class="form-group">
          <label for="comment">Your Review</label>
          <textarea id="comment" placeholder="Tell us about your experience…" maxlength="1000"></textarea>
          <span class="field-error" id="err-comment"></span>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <i class="fa-solid fa-paper-plane"></i>
          <span id="submit-text">Submit Review</span>
        </button>

      </form>
    </div>

    <!-- Success state -->
    <div id="success-state">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h2>Review Submitted!</h2>
      <p>Thank you for your feedback. Your review will appear on the store once approved.</p>
      <a href="../index.html" class="btn-back-store">
        <i class="fa-solid fa-store"></i> Back to Store
      </a>
    </div>
  </div>

  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/review.js"></script>
</body>
</html>
