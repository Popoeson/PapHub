<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PapHub — Admin Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin-login.css" />
</head>
<body>
  <div class="login-wrapper">

    <!-- Background decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card glass">
      <div class="brand">
        <span class="brand-icon"><i class="fa-solid fa-bowl-food"></i></span>
        <h1 class="brand-name">PapHub</h1>
        <p class="brand-sub">Admin Portal</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="admin@paphub.com"
              autocomplete="email"
              required
            />
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fa-regular fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
        </button>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="login.js"></script>
</body>
</html>
