<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PapHub — Reviews</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/reviews-admin.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fa-solid fa-bowl-food"></i></span>
      <span class="brand-name">PapHub</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="categories.html" class="nav-item"><i class="fa-solid fa-tags"></i> Categories</a>
      <a href="products.html" class="nav-item"><i class="fa-solid fa-box"></i> Products</a>
      <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
      <a href="reviews.html" class="nav-item active"><i class="fa-solid fa-star"></i> Reviews</a>
    </nav>
    <button class="btn-logout" id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
      <h1 class="page-title">Reviews</h1>
    </header>

    <main class="main-content">

      <!-- Filter tabs -->
      <div class="review-tabs">
        <button class="review-tab active" data-filter="">All</button>
        <button class="review-tab" data-filter="false">Pending Approval</button>
        <button class="review-tab" data-filter="true">Approved</button>
      </div>

      <!-- Reviews list -->
      <div class="card">
        <div class="card-header">
          <span id="reviewCount">Loading...</span>
        </div>
        <div id="reviewsList" class="reviews-list">
          <div class="table-empty">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading...
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

    </main>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay hidden" id="deleteReviewModal">
    <div class="modal modal-sm glass">
      <div class="modal-header">
        <h2>Delete Review</h2>
        <button class="modal-close" id="closeDeleteReviewModal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <p class="modal-body-text">Are you sure you want to delete this review? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelDeleteReview">Cancel</button>
        <button class="btn-danger" id="confirmDeleteReview">
          <span class="btn-text">Delete</span>
          <span class="btn-loader hidden"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
        </button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="reviews.js"></script>
</body>
</html>
