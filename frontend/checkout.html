<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PapHub — Checkout</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/checkout.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon-sm"><i class="fa-solid fa-bowl-food"></i></span>
        <span class="brand-name">PapHub</span>
      </a>
      <div class="checkout-steps">
        <span class="step active"><i class="fa-solid fa-truck"></i> Delivery</span>
        <span class="step-divider"><i class="fa-solid fa-chevron-right"></i></span>
        <span class="step"><i class="fa-solid fa-lock"></i> Payment</span>
        <span class="step-divider"><i class="fa-solid fa-chevron-right"></i></span>
        <span class="step"><i class="fa-solid fa-circle-check"></i> Confirmation</span>
      </div>
    </div>
  </nav>

  <main class="checkout-main">
    <div class="checkout-grid">

      <!-- Delivery details form -->
      <section class="checkout-form-section">
        <div class="section-card glass">
          <h2 class="section-title">
            <i class="fa-solid fa-location-dot"></i> Delivery Details
          </h2>

          <form id="checkoutForm" novalidate>
            <div class="field-group">
              <label for="customerName">Full Name</label>
              <div class="input-wrap">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" id="customerName" placeholder="John Doe" required />
              </div>
              <span class="field-error" id="nameError"></span>
            </div>

            <div class="field-group">
              <label for="email">Email Address</label>
              <div class="input-wrap">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" placeholder="john@example.com" required />
              </div>
              <span class="field-error" id="emailError"></span>
            </div>

            <div class="field-group">
              <label for="phone">Phone Number</label>
              <div class="input-wrap">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" id="phone" placeholder="08012345678" required />
              </div>
              <span class="field-error" id="phoneError"></span>
            </div>

            <div class="field-group">
              <label for="address">Delivery Address</label>
              <div class="input-wrap">
                <i class="fa-solid fa-house input-icon"></i>
                <input type="text" id="address" placeholder="12 Main Street, Lagos" required />
              </div>
              <span class="field-error" id="addressError"></span>
            </div>

            <div class="field-group">
              <label for="landmark">Landmark <span class="label-hint">optional</span></label>
              <div class="input-wrap">
                <i class="fa-solid fa-map-pin input-icon"></i>
                <input type="text" id="landmark" placeholder="Near Shoprite, opposite First Bank..." />
              </div>
            </div>

            <button type="submit" class="btn-pay" id="payBtn">
              <span class="btn-text">
                <i class="fa-solid fa-lock"></i> Proceed to Payment
              </span>
              <span class="btn-loader hidden">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Initializing...
              </span>
            </button>

            <p class="pay-note">
              <i class="fa-solid fa-shield-halved"></i>
              Secured by Paystack. Your payment details are encrypted.
            </p>
          </form>
        </div>
      </section>

      <!-- Order summary sidebar -->
      <section class="order-summary-section">
        <div class="section-card glass sticky-card">
          <h2 class="section-title">
            <i class="fa-solid fa-basket-shopping"></i> Order Summary
          </h2>

          <div class="summary-items" id="summaryItems">
            <!-- Rendered by JS -->
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row">
            <span class="summary-label">Subtotal</span>
            <span class="summary-value" id="summarySubtotal">₦0.00</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Delivery</span>
            <span class="summary-value delivery-note">Arranged via WhatsApp</span>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row summary-total-row">
            <span class="summary-total-label">Total</span>
            <span class="summary-total-value" id="summaryTotal">₦0.00</span>
          </div>

          <a href="/" class="btn-back-store">
            <i class="fa-solid fa-arrow-left"></i> Back to Store
          </a>
        </div>
      </section>

    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/checkout.js"></script>
</body>
</html>
